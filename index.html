<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGT - Sistem Administrasi Guru Terpadu SMPIT AL-UKHUWAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // KONFIGURASI FIREBASE ANDA
		{
  "rules": {
    ".read": "now < 1778778000000",  // 2026-5-15
    ".write": "now < 1778778000000",  // 2026-5-15
  }
}
       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAHN_TW51EfPmmImoXzlh9cqB2F_zzbw4o",
  authDomain: "smp-islam-terpadu-al-ukhuwah.firebaseapp.com",
  projectId: "smp-islam-terpadu-al-ukhuwah",
  storageBucket: "smp-islam-terpadu-al-ukhuwah.firebasestorage.app",
  messagingSenderId: "885342303145",
  appId: "1:885342303145:web:b7fcbaec59c1e0c42fcab8",
  measurementId: "G-Q5X45T7XKW"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fungsi Simpan Data
        async function simpanData(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSimpan');
            btn.disabled = true;
            btn.innerText = "Menyimpan...";

            try {
                await addDoc(collection(db, "rpm_records"), {
                    nama: document.getElementById('nama').value,
                    mapel: document.getElementById('mapel').value,
                    materi: document.getElementById('materi').value,
                    internalisasi: document.getElementById('internalisasi').value,
                    status: "Submitted",
                    timestamp: serverTimestamp()
                });
                alert("Data Berhasil Tersimpan di Cloud!");
                document.getElementById('rpmForm').reset();
                loadData();
            } catch (error) {
                console.error("Error: ", error);
                alert("Gagal menyimpan data.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Simpan ke Database Cloud";
            }
        }

        // Fungsi Load Data untuk Monitoring
        async function loadData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = "<tr><td colspan='4' class='p-4 text-center'>Memuat data...</td></tr>";
            
            const q = query(collection(db, "rpm_records"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            
            tableBody.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                tableBody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 text-sm">
                        <td class="p-3 font-semibold">${data.nama}</td>
                        <td class="p-3">${data.mapel}</td>
                        <td class="p-3 text-blue-700 italic">"${data.internalisasi}"</td>
                        <td class="p-3"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">${data.status}</span></td>
                    </tr>
                `;
            });
        }

        window.simpanData = simpanData;
        window.onload = loadData;
    </script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="bg-emerald-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">SAGT: SMPIT AL-UKHUWAH Monitoring</h1>
            <span class="text-sm bg-emerald-800 px-3 py-1 rounded">Panel Kinerja Guru v1.0</span>
        </div>
    </header>

    <main class="container mx-auto p-4 lg:p-8 flex flex-col lg:flex-row gap-8">
        
        <section class="lg:w-1/3 bg-white p-6 rounded-xl shadow-md border-t-4 border-emerald-600">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                📝 Input RPM Baru
            </h2>
            <form id="rpmForm" onsubmit="simpanData(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Guru</label>
                    <input type="text" id="nama" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Mata Pelajaran</label>
                    <input type="text" id="mapel" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Materi Pokok</label>
                    <input type="text" id="materi" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 text-emerald-700 font-bold italic">
                        Internalisasi Nilai Islam (INI)
                    </label>
                    <textarea id="internalisasi" rows="3" placeholder="Masukkan kaitan ayat Al-Qur'an atau nilai adab..." required 
                        class="w-full mt-1 p-2 border border-emerald-200 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none bg-emerald-50"></textarea>
                </div>
                <button type="submit" id="btnSimpan" class="w-full bg-emerald-600 text-white font-bold py-2 rounded-md hover:bg-emerald-700 transition">
                    Simpan ke Database Cloud
                </button>
            </form>
        </section>

        <section class="lg:w-2/3 bg-white p-6 rounded-xl shadow-md overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">📊 Dashboard Monitoring Kinerja</h2>
                <button onclick="loadData()" class="text-emerald-600 hover:underline text-sm font-semibold">Refresh Data</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 uppercase text-xs">
                            <th class="p-3">Guru</th>
                            <th class="p-3">Mapel</th>
                            <th class="p-3">Internalisasi Islam</th>
                            <th class="p-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="text-center p-8 text-gray-500 text-sm">
        &copy; 2026 Admin Kinerja Sekolah - SMP Islam Terpadu Al-Ukhuwah. All Rights Reserved.
    </footer>

</body>
</html>
